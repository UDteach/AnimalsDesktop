name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
      - name: Generate assets
        run: |
          go run ./cmd/importsheet
          go run ./cmd/importanimals
          go run ./cmd/validatemotion -runtime-only -require-accepted
      - name: Test
        run: go test -buildvcs=false ./cmd/animalsdesktop
      - name: Build macOS ZIPs
        run: |
          VERSION="${{ github.ref_name }}" GOARCH=arm64 bash scripts/build_macos.sh
          VERSION="${{ github.ref_name }}" GOARCH=amd64 bash scripts/build_macos.sh
      - name: Upload macOS ZIPs
        uses: actions/upload-artifact@v4
        with:
          name: animalsdesktop-macos-zips
          path: |
            dist/AnimalsDesktop-macos-arm64.zip
            dist/AnimalsDesktop-macos-amd64.zip

  publish:
    runs-on: ubuntu-latest
    needs:
      - macos
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/**/*.zip
