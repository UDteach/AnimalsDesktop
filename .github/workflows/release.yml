name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
      - name: Generate assets
        shell: pwsh
        run: |
          go run ./cmd/importsheet
          go run ./cmd/importanimals
      - name: Test
        run: go test -buildvcs=false ./...
      - name: Build
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          $env:GOOS = "windows"
          $env:GOARCH = "amd64"
          go build -buildvcs=false -ldflags="-H=windowsgui -s -w -X main.appVersion=${{ github.ref_name }}" -o dist/AnimalsDesktop.exe ./cmd/degu
          Compress-Archive -Path dist/AnimalsDesktop.exe,README.md -DestinationPath dist/AnimalsDesktop-windows-amd64.zip -Force
          Remove-Item dist/AnimalsDesktop.exe -Force
          $env:GOARCH = "386"
          go build -buildvcs=false -ldflags="-H=windowsgui -s -w -X main.appVersion=${{ github.ref_name }}" -o dist/AnimalsDesktop.exe ./cmd/degu
          Compress-Archive -Path dist/AnimalsDesktop.exe,README.md -DestinationPath dist/AnimalsDesktop-windows-386.zip -Force
          Remove-Item dist/AnimalsDesktop.exe -Force
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/AnimalsDesktop-windows-amd64.zip
            dist/AnimalsDesktop-windows-386.zip
