name: Site Artifact

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify unlisted preview page
        shell: bash
        run: |
          SPRITE_PREVIEW="previews/sprite-review-3f8d9c2a7b6e4d1fb0a926c5894e31ad"
          MOTION_PREVIEW="previews/motion-generation-eval-20260623"
          grep -q "unlisted direct links" docs/index.html
          grep -q "AnimalsDesktop Asset Review" "docs/$SPRITE_PREVIEW/index.html"
          grep -q "Frame Motion And Generator Choice" "docs/$MOTION_PREVIEW/index.html"
          grep -q "Generator Comparison Images" "docs/$MOTION_PREVIEW/index.html"
          grep -q "noindex,nofollow,noarchive" "docs/$SPRITE_PREVIEW/index.html"
          grep -q "noindex,nofollow,noarchive" "docs/$MOTION_PREVIEW/index.html"
          ! grep -q "download/" docs/index.html
          ! grep -q "$SPRITE_PREVIEW" docs/index.html
          ! grep -q "$MOTION_PREVIEW" docs/index.html
          ! grep -q "Open Sprite Review" docs/index.html
          ! grep -q 'href="review/' docs/index.html
          ! grep -Eq "art-source|source-truth|rejected-candidates|review/candidates" "docs/$SPRITE_PREVIEW/index.html"
          ! grep -Eq "art-source|source-truth|rejected-candidates|review/candidates" "docs/$MOTION_PREVIEW/index.html"
          test -f docs/assets/animalsdesktop-seed-preview.png
          test -f docs/robots.txt
          for asset in \
            chinchilla_standard_gray_set00.png \
            sugar_glider_gray_set00.png \
            hamster_golden_syrian_set00.png \
            rabbit_chestnut_agouti_set00.png \
            gecko_gray_brown_set00.png
          do
            test -f "docs/$SPRITE_PREVIEW/assets/$asset"
          done
          test -f "docs/$MOTION_PREVIEW/assets/chinchilla_standard_gray_set00.png"
          test -f "docs/$MOTION_PREVIEW/assets/imagegen-four-pose-candidate.png"
          mkdir -p "public-site/assets"
          cp docs/index.html public-site/index.html
          cp docs/robots.txt public-site/robots.txt
          cp docs/assets/animalsdesktop-seed-preview.png public-site/assets/animalsdesktop-seed-preview.png
          for preview in "$SPRITE_PREVIEW" "$MOTION_PREVIEW"
          do
            mkdir -p "public-site/$preview"
            cp "docs/$preview/index.html" "public-site/$preview/index.html"
            cp -R "docs/$preview/assets" "public-site/$preview/assets"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: animalsdesktop-site
          path: public-site
