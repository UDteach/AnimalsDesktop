name: Site Artifact

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify Coming Soon page
        shell: bash
        run: |
          grep -q "Coming Soon" docs/index.html
          ! grep -q "download/" docs/index.html
          ! grep -Eiq "degu|デグー" docs/index.html
          ! grep -Eq "<img|art-source|source-truth|preview|pet-card|animal-list" docs/index.html
          mkdir -p public-site
          cp docs/index.html public-site/index.html
      - uses: actions/upload-artifact@v4
        with:
          name: animalsdesktop-site
          path: public-site
