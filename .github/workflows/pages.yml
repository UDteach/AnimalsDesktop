name: Site Artifact

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify public release page
        shell: bash
        run: |
          SPRITE_PREVIEW="previews/sprite-review-3f8d9c2a7b6e4d1fb0a926c5894e31ad"
          MOTION_PREVIEW="previews/motion-generation-eval-20260623"
          grep -q "Animals Desktop" docs/index.html
          grep -q "v0.1.5" docs/index.html
          grep -q "Windows版 Windows 10/11" docs/index.html
          grep -q "AnimalsDesktop-windows-amd64.zip" docs/index.html
          grep -q "Mac版 Apple Silicon" docs/index.html
          grep -q "AnimalsDesktop-macos-arm64.zip" docs/index.html
          grep -q "この版について" docs/index.html
          grep -q "AnimalsDesktop Asset Review" "docs/$SPRITE_PREVIEW/index.html"
          grep -q "Frame Motion And Generator Choice" "docs/$MOTION_PREVIEW/index.html"
          grep -q "Generator Comparison Images" "docs/$MOTION_PREVIEW/index.html"
          grep -q "noindex,nofollow,noarchive" "docs/$SPRITE_PREVIEW/index.html"
          grep -q "noindex,nofollow,noarchive" "docs/$MOTION_PREVIEW/index.html"
          ! grep -q "$SPRITE_PREVIEW" docs/index.html
          ! grep -q "$MOTION_PREVIEW" docs/index.html
          ! grep -q "Open Sprite Review" docs/index.html
          ! grep -q 'href="review/' docs/index.html
          ! grep -Eq "art-source|source-truth|rejected-candidates|review/candidates" docs/index.html
          ! grep -Eq "art-source|source-truth|rejected-candidates|review/candidates" "docs/$SPRITE_PREVIEW/index.html"
          ! grep -Eq "art-source|source-truth|rejected-candidates|review/candidates" "docs/$MOTION_PREVIEW/index.html"
          test -f docs/assets/animalsdesktop-preview.png
          test -f docs/assets/animal-icons/current-chinchilla_standard_gray.png
          test -f docs/assets/animal-icons/current-hamster_golden_syrian.png
          test -f docs/assets/animal-icons/current-djungarian_hamster.png
          test -f docs/assets/animal-icons/current-campbell_hamster.png
          test -f docs/assets/animal-icons/current-macaroni_mouse_tan.png
          test -f docs/assets/animal-icons/current-rabbit_chestnut_agouti.png
          test -f docs/assets/animal-icons/current-holland_lop_broken_orange.png
          test -f docs/assets/animal-icons/current-netherland_dwarf_chestnut.png
          test -f docs/assets/animal-icons/current-himalayan_rabbit.png
          test -f docs/assets/animal-icons/current-sugar_glider_gray.png
          test -f docs/assets/animal-icons/current-gecko_gray_brown.png
          test -f docs/assets/animal-icons/current-guinea_pig_tricolor.png
          test -f docs/assets/animal-icons/current-fancy_rat_hooded.png
          test -f docs/assets/animal-icons/current-albino_chipmunk.png
          test -f docs/assets/animal-icons/current-richardsons_ground_squirrel.png
          test -f docs/assets/animal-icons/current-yorkshire_terrier_longcoat.png
          test -f docs/assets/animalsdesktop-coming-soon-silhouettes.png
          for silhouette in \
            leopard_gecko \
            whites_tree_frog \
            chipmunk \
            budgerigar \
            cockatiel \
            java_sparrow \
            lovebird \
            parrotlet \
            scottish_fold \
            mixed_cat \
            munchkin \
            ragdoll \
            minuet \
            toy_poodle \
            chihuahua
          do
            test -f "docs/assets/upcoming-silhouettes/$silhouette.png"
          done
          test -f docs/robots.txt
          for asset in \
            chinchilla_standard_gray_set00.png \
            sugar_glider_gray_set00.png \
            hamster_golden_syrian_set00.png \
            rabbit_chestnut_agouti_set00.png \
            gecko_gray_brown_set00.png
          do
            test -f "docs/$SPRITE_PREVIEW/assets/$asset"
          done
          test -f "docs/$MOTION_PREVIEW/assets/chinchilla_standard_gray_set00.png"
          test -f "docs/$MOTION_PREVIEW/assets/imagegen-four-pose-candidate.png"
          mkdir -p "public-site/assets"
          mkdir -p "public-site/assets/animal-icons"
          mkdir -p "public-site/assets/upcoming-silhouettes"
          cp docs/index.html public-site/index.html
          cp docs/robots.txt public-site/robots.txt
          cp docs/assets/animalsdesktop-preview.png public-site/assets/animalsdesktop-preview.png
          cp docs/assets/animalsdesktop-coming-soon-silhouettes.png public-site/assets/animalsdesktop-coming-soon-silhouettes.png
          cp docs/assets/animal-icons/current-*.png public-site/assets/animal-icons/
          cp docs/assets/upcoming-silhouettes/*.png public-site/assets/upcoming-silhouettes/
          for preview in "$SPRITE_PREVIEW" "$MOTION_PREVIEW"
          do
            mkdir -p "public-site/$preview"
            cp "docs/$preview/index.html" "public-site/$preview/index.html"
            cp -R "docs/$preview/assets" "public-site/$preview/assets"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: animalsdesktop-site
          path: public-site
