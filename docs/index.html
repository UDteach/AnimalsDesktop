<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="AnimalsDesktop は、Windows のタスクバー上で小さな動物を飼えるデスクトップペットアプリです。現在リリース準備中です。"
    />
    <title>AnimalsDesktop - Coming Soon</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          "Segoe UI",
          system-ui,
          -apple-system,
          sans-serif;
        color: #1b211c;
        background: #f6f4ed;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        overflow-x: hidden;
      }

      a {
        color: #2d6750;
      }

      main {
        display: grid;
        align-content: center;
        min-height: 100vh;
        width: min(880px, 100%);
        max-width: 100vw;
        margin: 0 auto;
        padding: 32px 22px;
        overflow-wrap: anywhere;
      }

      .brand {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: center;
        margin-bottom: 44px;
        color: #596258;
        font-weight: 700;
      }

      .links {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
      }

      .mark {
        position: relative;
        width: 76px;
        height: 54px;
        margin-bottom: 26px;
      }

      .mark::before,
      .mark::after,
      .mark span::before,
      .mark span::after {
        position: absolute;
        content: "";
        display: block;
      }

      .mark::before {
        left: 9px;
        bottom: 5px;
        width: 48px;
        height: 31px;
        border-radius: 46% 52% 48% 45%;
        background: #a7aaa1;
        box-shadow: inset -9px -7px 0 #858a82;
      }

      .mark::after {
        right: 10px;
        bottom: 16px;
        width: 24px;
        height: 21px;
        border-radius: 50%;
        background: #b7bab0;
        box-shadow: inset -5px -4px 0 #8b9188;
      }

      .mark span::before {
        right: 25px;
        top: 2px;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: #8f948d;
      }

      .mark span::after {
        left: 0;
        bottom: 12px;
        width: 29px;
        height: 18px;
        border: 5px solid #9b9f97;
        border-right: 0;
        border-bottom: 0;
        border-radius: 22px 0 0 0;
      }

      h1 {
        margin: 0 0 14px;
        font-size: clamp(2.7rem, 8vw, 6rem);
        line-height: 0.95;
        letter-spacing: 0;
      }

      .lead {
        width: 100%;
        max-width: 720px;
        margin: 0;
        color: #2d342f;
        font-size: 1.08rem;
        line-height: 1.75;
      }

      .note {
        width: 100%;
        max-width: 720px;
        margin: 26px 0 0;
        border: 1px solid #d8d6cd;
        border-radius: 8px;
        padding: 16px;
        background: #fffdf8;
        color: #596258;
        line-height: 1.72;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 24px;
      }

      .button {
        display: inline-flex;
        align-items: center;
        min-height: 42px;
        border: 1px solid #9aa99e;
        border-radius: 6px;
        padding: 10px 14px;
        background: #fff;
        color: #1f382d;
        text-decoration: none;
        font-weight: 700;
      }

      .button.primary {
        border-color: #2f6b51;
        background: #2f6b51;
        color: #fff;
      }

      @media (max-width: 620px) {
        main {
          align-content: start;
          padding: 26px 16px 44px;
        }

        .brand {
          align-items: flex-start;
          flex-direction: column;
          margin-bottom: 34px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <nav class="brand" aria-label="ページリンク">
        <strong>AnimalsDesktop</strong>
        <div class="links">
          <a href="https://github.com/UDteach/AnimalsDesktop">GitHub</a>
          <a href="https://kdevelopk.pages.dev/">kdevelopk</a>
        </div>
      </nav>

      <section>
        <span class="mark" aria-hidden="true"><span></span></span>
        <h1>Coming Soon</h1>
        <p class="lead">
          AnimalsDesktop は現在リリース準備中です。最初の正式ペットはチンチラとして制作しています。
          完成した動物だけを、正式リリースと公開ページに掲載します。
        </p>
        <p class="note">
          未完成の動物、仮素材、作業中の候補はここには載せません。
          チンチラがフルモーション、設定反映、ローカル QA、GitHub Pages 更新まで完了した時点で公開します。
        </p>
        <div class="actions">
          <a class="button primary" href="https://github.com/UDteach/AnimalsDesktop">GitHub</a>
          <a class="button" href="https://kdevelopk.pages.dev/">Works</a>
        </div>
      </section>
    </main>
  </body>
</html>
